<!DOCTYPE html>
<html lang="de" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#00d9ff">
  <meta name="description" content="BeatMaster - Party Musikquiz Spiel. Identifiziere Songs und trete gegen deine Freunde an!">
  <meta name="author" content="BeatMaster">

  <title>BeatMaster - Musikquiz</title>

  <!-- Favicon (Platzhalter) -->
  <link rel="icon" href="assets/icons/icon-192x192.png">

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Apple Touch Icon -->
  <link rel="apple-touch-icon" href="assets/icons/icon-192x192.png">

  <!-- Google Fonts: Preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Google Fonts: Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Material Symbols: Outlined -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

  <!-- Tailwind Configuration -->
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#00d9ff",
            "background-light": "#f5f8f8",
            "background-dark": "#0f2023",
            "surface-dark": "#162a2d",
            "surface-dark-alt": "#1a2c30",
            "surface-dark-input": "#20454b",
          },
          fontFamily: {
            "display": ["Inter", "sans-serif"]
          },
          borderRadius: {
            DEFAULT: "1rem",
            lg: "2rem",
            xl: "3rem",
            full: "9999px"
          },
        },
      },
    }
  </script>

  <!-- Material Symbols Configuration -->
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 1, 'wght' 600, 'GRAD' 0, 'opsz' 24;
    }
  </style>

  <!-- Legacy CSS (will be gradually removed) -->
  <!-- TEMPORARILY DISABLED - conflicts with Tailwind -->
  <!--
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/screens.css">
  <link rel="stylesheet" href="css/responsive.css">
  -->
</head>
<body class="bg-background-dark font-display text-white antialiased min-h-screen relative">
  <!-- Ambient Background Effects -->
  <div id="ambient-background" class="absolute inset-0 z-0 pointer-events-none overflow-hidden">
    <!-- Top center glow -->
    <div class="absolute top-[-150px] left-1/2 -translate-x-1/2 w-[600px] h-[600px] bg-primary/10 rounded-full blur-[120px]"></div>
    <!-- Bottom right glow -->
    <div class="absolute bottom-[-100px] right-[-50px] w-[400px] h-[400px] bg-teal-800/20 rounded-full blur-[100px]"></div>
  </div>

  <!-- App Container -->
  <div id="app" class="relative z-10">
    <!-- Main Content Area -->
    <main id="main-content" class="flex flex-col h-full min-h-screen w-full max-w-md mx-auto">
      <!-- Screens werden hier dynamisch gerendert -->
      <div class="screen-container"></div>
    </main>

    <!-- Modal Container -->
    <div id="modal-root" class="fixed inset-0 z-50 pointer-events-none"></div>

    <!-- Notification Container -->
    <div id="notification-root" class="fixed top-4 right-4 z-50 flex flex-col gap-3 max-w-sm pointer-events-none"></div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="fixed inset-0 bg-background-dark/90 backdrop-blur-sm flex items-center justify-center z-50" style="display:none;">
      <div class="w-16 h-16 border-4 border-primary/30 border-t-primary rounded-full animate-spin"></div>
    </div>
  </div>

  <!-- Scripts - Config & Utils zuerst -->
  <script src="js/config.js"></script>
  <script src="js/modules/utils.js"></script>
  <script src="js/state.js"></script>

  <!-- Core Modules -->
  <script src="js/modules/storage.js"></script>
  <script src="js/modules/database.js"></script>
  <script src="js/modules/youtube-player.js"></script>
  <script src="js/modules/timer.js"></script>
  <script src="js/modules/question-generator.js"></script>
  <script src="js/modules/scoring.js"></script>
  <script src="js/modules/game-engine.js"></script>

  <!-- NEW: Animation & Sound Modules -->
  <script src="js/modules/countdown-timer.js"></script>
  <script src="js/modules/question-animator.js"></script>
  <script src="js/modules/vinyl-animator.js"></script>
  <script src="js/modules/sound-player.js"></script>

  <!-- Screen Controllers -->
  <script src="js/screens/home.js"></script>
  <script src="js/screens/database-manager.js"></script>
  <script src="js/screens/game-setup.js"></script>
  <script src="js/screens/gameplay.js"></script>
  <script src="js/screens/scoreboard.js"></script>
  <script src="js/screens/results.js"></script>
  <script src="js/screens/settings.js"></script>
  <script src="js/screens/history.js"></script>

  <!-- Main App - Muss zuletzt geladen werden -->
  <script src="js/app.js"></script>

  <!-- DEBUG MODE - Disabled for production -->
  <!-- Uncomment for debugging:
  <script>
    window.DEBUG = true;
    // ... debug code here ...
  </script>
  -->

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(registration => {
            console.log('Service Worker registriert:', registration.scope);
          })
          .catch(error => {
            console.log('Service Worker Registrierung fehlgeschlagen:', error);
          });
      });
    }
  </script>
</body>
</html>
