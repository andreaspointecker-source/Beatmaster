<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Click vs Touch Test</title>
  <style>
    body {
      font-family: system-ui;
      background: #0f2023;
      color: white;
      padding: 20px;
      margin: 0;
    }
    .test-box {
      background: #162a2d;
      padding: 30px;
      margin: 20px 0;
      border-radius: 12px;
      border: 2px solid #00d9ff;
    }
    button {
      width: 100%;
      padding: 20px;
      margin: 10px 0;
      font-size: 18px;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #00d9ff;
      color: #0f2023;
    }
    button:hover {
      background: #00c0e0;
    }
    .log {
      background: #000;
      padding: 15px;
      margin-top: 20px;
      border-radius: 8px;
      font-family: monospace;
      font-size: 14px;
      max-height: 400px;
      overflow-y: auto;
    }
    .log div { margin: 3px 0; }
    .success { color: #4ade80; }
    .error { color: #f87171; }
    .info { color: #60a5fa; }
  </style>
</head>
<body>
  <h1>🖱️ Click vs Touch Test</h1>

  <div class="test-box">
    <h2>Test 1: Einfacher Button</h2>
    <button id="btn1">KLICK MICH (Test 1)</button>
  </div>

  <div class="test-box">
    <h2>Test 2: Mit z-index Problemen</h2>
    <div style="position: relative;">
      <div style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: -1; background: rgba(255,0,0,0.1);"></div>
      <button id="btn2" style="position: relative; z-index: 10;">KLICK MICH (Test 2)</button>
    </div>
  </div>

  <div class="test-box">
    <h2>Test 3: Wie in BeatMaster</h2>
    <div style="position: relative; overflow: hidden;">
      <!-- Ambient Background wie in der App -->
      <div style="position: absolute; inset: 0; z-index: 0; pointer-events: none;">
        <div style="position: absolute; top: -100px; left: 50%; transform: translateX(-50%); width: 400px; height: 400px; background: rgba(0, 217, 255, 0.1); border-radius: 50%; filter: blur(80px);"></div>
      </div>

      <div style="position: relative; z-index: 10;">
        <button id="btn3">KLICK MICH (Test 3 - wie BeatMaster)</button>
      </div>
    </div>
  </div>

  <div class="test-box">
    <h2>Event Log</h2>
    <div class="log" id="log">
      <div class="info">Warte auf Events...</div>
    </div>
  </div>

  <script>
    const log = document.getElementById('log');

    function addLog(msg, type = 'info') {
      const div = document.createElement('div');
      div.className = type;
      const time = new Date().toLocaleTimeString();
      div.textContent = `[${time}] ${msg}`;
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
      console.log(msg);
    }

    // Test alle Event-Typen
    const buttons = ['btn1', 'btn2', 'btn3'];

    buttons.forEach(btnId => {
      const btn = document.getElementById(btnId);

      // Click Event
      btn.addEventListener('click', (e) => {
        addLog(`✅ ${btnId}: CLICK Event erkannt!`, 'success');
        addLog(`   → clientX: ${e.clientX}, clientY: ${e.clientY}`, 'info');
        addLog(`   → target: ${e.target.tagName}`, 'info');
      });

      // Mouse Events
      btn.addEventListener('mousedown', (e) => {
        addLog(`🖱️ ${btnId}: MOUSEDOWN Event`, 'info');
      });

      btn.addEventListener('mouseup', (e) => {
        addLog(`🖱️ ${btnId}: MOUSEUP Event`, 'info');
      });

      // Touch Events
      btn.addEventListener('touchstart', (e) => {
        addLog(`👆 ${btnId}: TOUCHSTART Event`, 'info');
      });

      btn.addEventListener('touchend', (e) => {
        addLog(`👆 ${btnId}: TOUCHEND Event`, 'info');
      });

      // Pointer Events
      btn.addEventListener('pointerdown', (e) => {
        addLog(`👉 ${btnId}: POINTERDOWN Event (${e.pointerType})`, 'info');
      });
    });

    // Globale Events tracken
    document.addEventListener('click', (e) => {
      if (!e.target.id.startsWith('btn')) {
        addLog(`⚠️ Click auf: ${e.target.tagName} (nicht auf Button!)`, 'error');
      }
    }, true);

    addLog('🔄 Test bereit! Klicke auf die Buttons', 'info');
    addLog('ℹ️ Wenn keine Click Events erscheinen, ist etwas blockiert', 'info');
  </script>
</body>
</html>
