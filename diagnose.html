<!DOCTYPE html>
<html lang="de" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BeatMaster Diagnose</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#00d9ff",
            "background-dark": "#0f2023",
            "surface-dark": "#162a2d",
          },
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 1, 'wght' 600, 'GRAD' 0, 'opsz' 24;
    }
    body {
      font-family: 'Inter', sans-serif;
    }
  </style>
</head>
<body class="bg-background-dark text-white min-h-screen p-6">
  <div class="max-w-4xl mx-auto">
    <div class="flex items-center gap-4 mb-8">
      <span class="material-symbols-outlined text-primary text-5xl">bug_report</span>
      <h1 class="text-3xl font-bold">BeatMaster Diagnose</h1>
    </div>

    <!-- Error Console -->
    <div class="bg-surface-dark rounded-2xl p-6 mb-6">
      <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
        <span class="material-symbols-outlined text-red-400">error</span>
        JavaScript Fehler
      </h2>
      <div id="error-console" class="font-mono text-sm text-red-400 bg-black/30 rounded-lg p-4 min-h-[100px] max-h-[300px] overflow-y-auto">
        <div class="text-white/40">Warte auf Fehler...</div>
      </div>
    </div>

    <!-- Module Status -->
    <div class="bg-surface-dark rounded-2xl p-6 mb-6">
      <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
        <span class="material-symbols-outlined text-primary">inventory_2</span>
        Modul-Status
      </h2>
      <div id="module-status" class="space-y-2">
        <!-- Wird per JS gefüllt -->
      </div>
    </div>

    <!-- Screen Status -->
    <div class="bg-surface-dark rounded-2xl p-6 mb-6">
      <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
        <span class="material-symbols-outlined text-primary">view_compact</span>
        Screen-Status
      </h2>
      <div id="screen-status" class="space-y-2">
        <!-- Wird per JS gefüllt -->
      </div>
    </div>

    <!-- Quick Actions -->
    <div class="bg-surface-dark rounded-2xl p-6">
      <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
        <span class="material-symbols-outlined text-primary">play_arrow</span>
        Quick Actions
      </h2>
      <div class="flex flex-wrap gap-3">
        <button onclick="runFullTest()" class="bg-primary text-background-dark px-4 py-2 rounded-full font-bold hover:brightness-110">
          Vollständiger Test
        </button>
        <button onclick="clearStorage()" class="bg-red-500 text-white px-4 py-2 rounded-full font-bold hover:brightness-110">
          Storage leeren
        </button>
        <button onclick="addTestData()" class="bg-green-500 text-white px-4 py-2 rounded-full font-bold hover:brightness-110">
          Test-Daten hinzufügen
        </button>
        <button onclick="window.location.href='/index.html'" class="bg-surface-dark border border-primary text-primary px-4 py-2 rounded-full font-bold hover:bg-primary/10">
          Zur Haupt-App
        </button>
      </div>
    </div>

    <!-- Console Output -->
    <div class="mt-6 bg-surface-dark rounded-2xl p-6">
      <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
        <span class="material-symbols-outlined text-primary">terminal</span>
        Test-Output
      </h2>
      <div id="console-output" class="font-mono text-sm text-white/70 bg-black/30 rounded-lg p-4 min-h-[200px] max-h-[400px] overflow-y-auto">
        <div class="text-white/40">Klicke auf "Vollständiger Test"</div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/config.js"></script>
  <script src="js/modules/utils.js"></script>
  <script src="js/state.js"></script>
  <script src="js/modules/storage.js"></script>

  <script>
    // Error Tracking
    const errors = [];
    window.addEventListener('error', (e) => {
      errors.push({
        type: 'Error',
        message: e.message,
        file: e.filename,
        line: e.lineno,
        col: e.colno,
        time: new Date().toLocaleTimeString()
      });
      updateErrorConsole();
    });

    window.addEventListener('unhandledrejection', (e) => {
      errors.push({
        type: 'Promise Rejection',
        message: e.reason?.message || e.reason,
        time: new Date().toLocaleTimeString()
      });
      updateErrorConsole();
    });

    function updateErrorConsole() {
      const el = document.getElementById('error-console');
      if (errors.length === 0) {
        el.innerHTML = '<div class="text-white/40">Keine Fehler 🎉</div>';
      } else {
        el.innerHTML = errors.map(err => `
          <div class="mb-3 pb-3 border-b border-red-900/50">
            <div class="text-red-300 font-bold">[${err.time}] ${err.type}</div>
            <div class="text-red-400 mt-1">${err.message}</div>
            ${err.file ? `<div class="text-red-600 text-xs mt-1">${err.file}:${err.line}:${err.col}</div>` : ''}
          </div>
        `).join('');
      }
    }

    // Console Output Helper
    function log(message, type = 'info') {
      const el = document.getElementById('console-output');
      const colors = {
        success: 'text-green-400',
        error: 'text-red-400',
        warning: 'text-yellow-400',
        info: 'text-blue-400'
      };
      const time = new Date().toLocaleTimeString();
      el.innerHTML += `<div class="${colors[type]} mb-1">[${time}] ${message}</div>`;
      el.scrollTop = el.scrollHeight;
      console.log(message);
    }

    function clearLog() {
      document.getElementById('console-output').innerHTML = '';
    }

    // Module Status Check
    function checkModules() {
      const modules = [
        { name: 'CONFIG', check: () => typeof CONFIG !== 'undefined' },
        { name: 'Utils', check: () => typeof Utils !== 'undefined' },
        { name: 'State', check: () => typeof State !== 'undefined' },
        { name: 'Storage', check: () => typeof Storage !== 'undefined' },
      ];

      const el = document.getElementById('module-status');
      el.innerHTML = modules.map(mod => {
        const ok = mod.check();
        return `
          <div class="flex items-center gap-3 p-3 rounded-lg ${ok ? 'bg-green-900/20' : 'bg-red-900/20'}">
            <span class="material-symbols-outlined ${ok ? 'text-green-400' : 'text-red-400'}">
              ${ok ? 'check_circle' : 'cancel'}
            </span>
            <span class="font-mono">${mod.name}</span>
          </div>
        `;
      }).join('');
    }

    // Screen Status Check
    function checkScreens() {
      const screens = [
        'HomeScreen', 'DatabaseManagerScreen', 'GameSetupScreen',
        'GameplayScreen', 'ScoreboardScreen', 'ResultsScreen',
        'SettingsScreen', 'HistoryScreen'
      ];

      const el = document.getElementById('screen-status');
      el.innerHTML = screens.map(screen => {
        const ok = typeof window[screen] !== 'undefined';
        return `
          <div class="flex items-center gap-3 p-3 rounded-lg ${ok ? 'bg-green-900/20' : 'bg-red-900/20'}">
            <span class="material-symbols-outlined ${ok ? 'text-green-400' : 'text-red-400'}">
              ${ok ? 'check_circle' : 'cancel'}
            </span>
            <span class="font-mono">${screen}</span>
          </div>
        `;
      }).join('');
    }

    // Full Test
    function runFullTest() {
      clearLog();
      log('🔍 Starte Diagnose...', 'info');

      // Module Tests
      log('--- Module Tests ---', 'info');

      if (typeof CONFIG !== 'undefined') {
        log('✅ CONFIG geladen: ' + CONFIG.APP.NAME, 'success');
      } else {
        log('❌ CONFIG nicht gefunden', 'error');
      }

      if (typeof Utils !== 'undefined') {
        const uuid = Utils.generateUUID();
        log('✅ Utils geladen, UUID Test: ' + uuid.substring(0, 8) + '...', 'success');
      } else {
        log('❌ Utils nicht gefunden', 'error');
      }

      if (typeof State !== 'undefined') {
        State.set('diagnose_test', 'hello');
        const val = State.get('diagnose_test');
        log('✅ State geladen, Test-Wert: ' + val, 'success');
      } else {
        log('❌ State nicht gefunden', 'error');
      }

      if (typeof Storage !== 'undefined') {
        log('✅ Storage geladen', 'success');
        const size = Storage.getStorageSize();
        log('📊 Storage-Größe: ' + size.totalKB + ' KB', 'info');
      } else {
        log('❌ Storage nicht gefunden', 'error');
      }

      // Storage Tests
      log('--- Storage Tests ---', 'info');
      try {
        const songs = Storage.getSongs();
        log(`📀 Songs in Datenbank: ${songs.length}`, songs.length > 0 ? 'success' : 'warning');

        const settings = Storage.getSettings();
        log('⚙️ Einstellungen geladen: ' + (settings ? 'Ja' : 'Nein'), settings ? 'success' : 'warning');

        const gameState = Storage.getGameState();
        log('🎮 Gespeicherter Spielstatus: ' + (gameState ? 'Ja' : 'Nein'), gameState ? 'success' : 'info');
      } catch(e) {
        log('❌ Storage Test Fehler: ' + e.message, 'error');
      }

      log('✅ Diagnose abgeschlossen!', 'success');
      checkModules();
      checkScreens();
    }

    function clearStorage() {
      if (confirm('Wirklich alle Daten löschen?')) {
        try {
          Storage.clear();
          log('🗑️ Storage geleert', 'success');
          location.reload();
        } catch(e) {
          log('❌ Fehler beim Leeren: ' + e.message, 'error');
        }
      }
    }

    function addTestData() {
      clearLog();
      log('➕ Füge Test-Daten hinzu...', 'info');

      const testSongs = [
        { title: 'Bohemian Rhapsody', artist: 'Queen', year: 1975, genre: 'Rock', youtubeId: 'fJ9rUzIMcZQ' },
        { title: 'Billie Jean', artist: 'Michael Jackson', year: 1983, genre: 'Pop', youtubeId: 'Zi_XLOBDo_Y' },
        { title: 'Smells Like Teen Spirit', artist: 'Nirvana', year: 1991, genre: 'Grunge', youtubeId: 'hTWKbfoikeg' },
        { title: 'Wonderwall', artist: 'Oasis', year: 1995, genre: 'Rock', youtubeId: 'bx1Bh8ZvH84' },
        { title: 'Shape of You', artist: 'Ed Sheeran', year: 2017, genre: 'Pop', youtubeId: 'JGwWNGJdvx8' }
      ];

      const songs = testSongs.map(s => ({
        id: Utils.generateUUID(),
        ...s,
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString()
      }));

      try {
        Storage.saveSongs(songs);
        log('✅ ' + songs.length + ' Test-Songs hinzugefügt', 'success');
        songs.forEach(s => log(`  • ${s.title} - ${s.artist}`, 'info'));
      } catch(e) {
        log('❌ Fehler: ' + e.message, 'error');
      }
    }

    // Initial Load
    window.addEventListener('load', () => {
      checkModules();
      checkScreens();
      updateErrorConsole();
      log('🎵 BeatMaster Diagnose bereit', 'success');
    });
  </script>
</body>
</html>
