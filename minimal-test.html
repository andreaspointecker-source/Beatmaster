<!DOCTYPE html>
<html lang="de" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BeatMaster Minimal Test</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#00d9ff",
            "background-dark": "#0f2023",
            "surface-dark": "#162a2d",
          },
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 600; }
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-background-dark text-white min-h-screen">
  <div id="app" class="max-w-md mx-auto p-6">
    <h1 class="text-2xl font-bold mb-6">🎵 BeatMaster Minimal Test</h1>

    <div class="space-y-4">
      <!-- Test Button 1: Inline onclick -->
      <button
        onclick="alert('Inline onclick funktioniert!')"
        class="w-full bg-primary text-background-dark px-6 py-3 rounded-full font-bold hover:brightness-110">
        Test 1: Inline onclick
      </button>

      <!-- Test Button 2: addEventListener -->
      <button
        id="test-btn-2"
        class="w-full bg-green-500 text-white px-6 py-3 rounded-full font-bold hover:brightness-110">
        Test 2: addEventListener
      </button>

      <!-- Test Button 3: data-action Attribut -->
      <button
        data-action="test-action"
        class="w-full bg-blue-500 text-white px-6 py-3 rounded-full font-bold hover:brightness-110">
        Test 3: data-action
      </button>

      <!-- Test Button 4: App.navigate Simulation -->
      <button
        id="test-navigate"
        class="w-full bg-purple-500 text-white px-6 py-3 rounded-full font-bold hover:brightness-110">
        Test 4: Navigation simulieren
      </button>

      <!-- Link zur Hauptapp -->
      <a href="index.html" class="block w-full bg-surface-dark border border-primary text-primary px-6 py-3 rounded-full font-bold text-center hover:bg-primary/10">
        Zur Haupt-App (index.html)
      </a>

      <a href="diagnose.html" class="block w-full bg-surface-dark border border-white/20 text-white px-6 py-3 rounded-full font-bold text-center hover:bg-white/5">
        Zur Diagnose-Seite
      </a>
    </div>

    <!-- Output -->
    <div id="output" class="mt-6 bg-surface-dark rounded-2xl p-4 min-h-[200px]">
      <h2 class="font-bold mb-2">Test-Output:</h2>
      <div id="output-content" class="text-sm text-white/70 font-mono">
        Klicke auf die Buttons zum Testen...
      </div>
    </div>
  </div>

  <script>
    const output = document.getElementById('output-content');

    function log(message) {
      const time = new Date().toLocaleTimeString();
      output.innerHTML += `<div>[${time}] ${message}</div>`;
      console.log(message);
    }

    // Test 2: addEventListener
    document.getElementById('test-btn-2').addEventListener('click', () => {
      log('✅ addEventListener funktioniert!');
    });

    // Test 3: data-action
    document.querySelector('[data-action="test-action"]').addEventListener('click', (e) => {
      const action = e.target.dataset.action;
      log(`✅ data-action="${action}" funktioniert!`);
    });

    // Test 4: Navigation
    document.getElementById('test-navigate').addEventListener('click', () => {
      log('🔄 Simuliere App.navigate("database")...');

      // Simuliere die App-Navigation
      if (typeof App !== 'undefined' && App.navigate) {
        log('✅ App.navigate() gefunden');
        App.navigate('database');
      } else {
        log('⚠️ App.navigate() nicht gefunden (normal auf Minimal-Test)');
        log('ℹ️ Navigiere stattdessen zur Haupt-App...');
        window.location.href = 'index.html#database';
      }
    });

    // Error Tracking
    window.addEventListener('error', (e) => {
      log(`❌ Error: ${e.message}`);
    });

    // Initial Message
    window.addEventListener('load', () => {
      log('🎵 Minimal Test geladen');
      log('Alle Buttons sollten funktionieren');
    });
  </script>
</body>
</html>
