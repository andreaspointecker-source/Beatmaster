<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>BeatMaster Home</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#00d9ff",
                        "background-light": "#f5f8f8",
                        "background-dark": "#0f2023",
                        "surface-dark": "#162a2d",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 500, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen font-display antialiased selection:bg-primary selection:text-background-dark overflow-hidden relative text-white">
<!-- Ambient Background Effects -->
<div class="absolute inset-0 z-0 pointer-events-none overflow-hidden">
<!-- Top center glow -->
<div class="absolute top-[-150px] left-1/2 -translate-x-1/2 w-[600px] h-[600px] bg-primary/10 rounded-full blur-[120px]"></div>
<!-- Bottom right glow -->
<div class="absolute bottom-[-100px] right-[-50px] w-[400px] h-[400px] bg-teal-800/20 rounded-full blur-[100px]"></div>
<!-- Subtle noise texture overlay if desired, kept clean here -->
</div>
<!-- Main Content Container -->
<div class="relative z-10 flex flex-col h-full min-h-screen w-full max-w-md mx-auto px-6 py-4">
<!-- Hero Section: Logo & Title -->
<div class="flex-1 flex flex-col items-center justify-center py-6 min-h-[35vh]">
<div class="relative mb-8 group">
<!-- Glow behind logo -->
<div class="absolute inset-0 bg-primary/30 blur-2xl rounded-full transform scale-125"></div>
<!-- Logo Circle -->
<div class="relative flex items-center justify-center w-28 h-28 rounded-full bg-surface-dark border border-primary/20 shadow-2xl shadow-primary/10">
<span class="material-symbols-outlined text-primary text-6xl drop-shadow-[0_0_10px_rgba(0,217,255,0.5)]">music_note</span>
</div>
</div>
<div class="text-center space-y-3">
<h1 class="text-4xl md:text-5xl font-extrabold text-white tracking-tight drop-shadow-lg">
                    Beat<span class="text-primary">Master</span>
</h1>
<h3 class="text-white/70 text-lg font-semibold tracking-wide leading-tight">
                    Dein ultimatives Musik-Quiz
                </h3>
</div>
</div>
<!-- Button Stack -->
<div class="flex flex-col gap-4 w-full pb-8">
<!-- Primary Action -->
<button class="relative w-full h-14 bg-primary hover:bg-primary/90 text-background-dark rounded-full flex items-center justify-center shadow-[0_4px_20px_rgba(0,217,255,0.3)] hover:shadow-[0_4px_30px_rgba(0,217,255,0.5)] transition-all transform active:scale-[0.98] group">
<span class="material-symbols-outlined absolute left-6 text-[28px]">play_circle</span>
<span class="font-bold text-base md:text-lg tracking-widest uppercase">Neues Spiel Starten</span>
</button>
<!-- Secondary Action -->
<button class="relative w-full h-14 bg-surface-dark hover:bg-white/10 text-white border border-white/10 rounded-full flex items-center justify-center transition-all transform active:scale-[0.98] group">
<span class="material-symbols-outlined absolute left-6 text-primary text-[24px]">resume</span>
<span class="font-bold text-base tracking-widest uppercase">Spiel Fortsetzen</span>
</button>
<!-- Outline Actions Stack -->
<div class="flex flex-col gap-3 mt-2">
<button class="relative w-full h-12 bg-transparent hover:bg-white/5 text-white/90 border border-white/20 hover:border-white/40 rounded-full flex items-center justify-center transition-all active:scale-[0.98]">
<span class="material-symbols-outlined absolute left-6 text-white/60 text-[20px]">library_music</span>
<span class="font-bold text-sm tracking-widest uppercase">Song-Datenbank</span>
</button>
<button class="relative w-full h-12 bg-transparent hover:bg-white/5 text-white/90 border border-white/20 hover:border-white/40 rounded-full flex items-center justify-center transition-all active:scale-[0.98]">
<span class="material-symbols-outlined absolute left-6 text-white/60 text-[20px]">history</span>
<span class="font-bold text-sm tracking-widest uppercase">Spiel-Historie</span>
</button>
</div>
<!-- Ghost Action -->
<button class="mt-4 w-full h-10 flex items-center justify-center text-white/40 hover:text-white transition-colors gap-2">
<span class="material-symbols-outlined text-lg">settings</span>
<span class="text-xs font-bold tracking-[0.15em] uppercase">Einstellungen</span>
</button>
</div>
<!-- Footer Info -->
<div class="mt-auto pb-6 text-center">
<div class="w-12 h-1 bg-white/10 mx-auto rounded-full mb-4"></div>
<p class="text-white/30 text-[10px] md:text-xs font-medium tracking-widest uppercase font-mono">
                v1.2.0 • 12,403 Songs Available
            </p>
</div>
</div>
</body></html>
