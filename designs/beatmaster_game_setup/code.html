<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>BeatMaster Game Setup</title>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#00d9ff", // Neon Cyan
                        "primary-dark": "#00acc9",
                        "background-light": "#f5f8f8",
                        "background-dark": "#0f2023", // Deep Teal/Charcoal
                        "surface-dark": "#162e33",
                        "surface-light": "#20454b",
                        "text-secondary": "#8dc4ce",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"],
                        "body": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        /* Custom range slider styling for Webkit */
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: #00d9ff;
            cursor: pointer;
            margin-top: -8px; 
            box-shadow: 0 0 10px rgba(0, 217, 255, 0.5);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #20454b;
            border-radius: 2px;
        }
        /* Custom scrollbar hiding */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-white selection:bg-primary selection:text-background-dark antialiased">
<!-- Main Container -->
<div class="relative flex h-full min-h-screen w-full flex-col overflow-x-hidden pb-32">
<!-- Top App Bar -->
<header class="sticky top-0 z-50 flex items-center bg-background-dark/80 backdrop-blur-md p-4 pb-2 justify-between border-b border-white/5">
<button class="text-white flex size-12 shrink-0 items-center justify-center hover:bg-white/10 rounded-full transition-colors">
<span class="material-symbols-outlined">arrow_back_ios_new</span>
</button>
<h2 class="text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">Neues Spiel</h2>
</header>
<!-- Main Content Scroll Area -->
<main class="flex flex-col gap-6 p-4">
<!-- Section: Spielmodus -->
<section>
<h3 class="text-white tracking-wide text-xs font-bold uppercase opacity-70 px-1 mb-3">Spielmodus</h3>
<!-- Segmented Control -->
<div class="flex p-1 bg-surface-dark rounded-full border border-white/5">
<label class="flex-1 cursor-pointer">
<input checked="" class="peer sr-only" name="mode" type="radio" value="classic"/>
<div class="flex h-10 w-full items-center justify-center rounded-full text-sm font-medium text-text-secondary transition-all peer-checked:bg-primary peer-checked:text-background-dark peer-checked:shadow-lg peer-checked:shadow-primary/20">
                            Klassisch
                        </div>
</label>
<label class="flex-1 cursor-pointer">
<input class="peer sr-only" name="mode" type="radio" value="speed"/>
<div class="flex h-10 w-full items-center justify-center rounded-full text-sm font-medium text-text-secondary transition-all peer-checked:bg-primary peer-checked:text-background-dark peer-checked:shadow-lg peer-checked:shadow-primary/20">
                            Speed
                        </div>
</label>
<label class="flex-1 cursor-pointer">
<input class="peer sr-only" name="mode" type="radio" value="marathon"/>
<div class="flex h-10 w-full items-center justify-center rounded-full text-sm font-medium text-text-secondary transition-all peer-checked:bg-primary peer-checked:text-background-dark peer-checked:shadow-lg peer-checked:shadow-primary/20">
                            Marathon
                        </div>
</label>
</div>
<p class="text-xs text-text-secondary mt-3 px-2 leading-relaxed">
                    Standard-Regeln: 30 Sekunden pro Song, Joker erlaubt.
                </p>
</section>
<!-- Section: Teams -->
<section>
<div class="flex items-center justify-between mb-3 px-1">
<h3 class="text-white tracking-wide text-xs font-bold uppercase opacity-70">Teams</h3>
<span class="text-xs text-primary font-medium cursor-pointer flex items-center gap-1">
<span class="material-symbols-outlined text-sm">add</span> Hinzufügen
                    </span>
</div>
<div class="space-y-3">
<!-- Team 1 -->
<div class="group flex w-full items-center rounded-2xl bg-surface-dark border border-white/5 focus-within:border-primary/50 transition-colors p-1 pr-4">
<div class="flex size-12 shrink-0 items-center justify-center">
<button class="size-6 rounded-full bg-[#ff4b4b] shadow-[0_0_8px_rgba(255,75,75,0.4)] border-2 border-transparent hover:scale-110 transition-transform"></button>
</div>
<input class="flex-1 bg-transparent border-none text-white placeholder-text-secondary/50 focus:ring-0 text-base font-medium h-12" placeholder="Team Name" type="text" value="Die Rockers"/>
<span class="material-symbols-outlined text-text-secondary/50 group-focus-within:text-primary">edit</span>
</div>
<!-- Team 2 -->
<div class="group flex w-full items-center rounded-2xl bg-surface-dark border border-white/5 focus-within:border-primary/50 transition-colors p-1 pr-4">
<div class="flex size-12 shrink-0 items-center justify-center">
<button class="size-6 rounded-full bg-[#4b7bff] shadow-[0_0_8px_rgba(75,123,255,0.4)] border-2 border-transparent hover:scale-110 transition-transform"></button>
</div>
<input class="flex-1 bg-transparent border-none text-white placeholder-text-secondary/50 focus:ring-0 text-base font-medium h-12" placeholder="Team Name" type="text" value="Disco Queens"/>
<span class="material-symbols-outlined text-text-secondary/50 group-focus-within:text-primary">edit</span>
</div>
</div>
</section>
<!-- Section: Einstellungen (Sliders) -->
<section>
<h3 class="text-white tracking-wide text-xs font-bold uppercase opacity-70 px-1 mb-4">Einstellungen</h3>
<div class="space-y-6 bg-surface-dark rounded-3xl p-5 border border-white/5">
<!-- Rounds Slider -->
<div>
<div class="flex justify-between items-center mb-2">
<label class="text-sm font-medium text-text-secondary">Runden</label>
<span class="text-base font-bold text-white bg-white/10 px-2 py-0.5 rounded-md min-w-[3ch] text-center">10</span>
</div>
<input class="w-full h-2 bg-surface-light rounded-lg appearance-none cursor-pointer" max="20" min="1" type="range" value="10"/>
</div>
<!-- Songs Slider -->
<div>
<div class="flex justify-between items-center mb-2">
<label class="text-sm font-medium text-text-secondary">Songs pro Runde</label>
<span class="text-base font-bold text-white bg-white/10 px-2 py-0.5 rounded-md min-w-[3ch] text-center">5</span>
</div>
<input class="w-full h-2 bg-surface-light rounded-lg appearance-none cursor-pointer" max="10" min="1" type="range" value="5"/>
</div>
<!-- Time Slider -->
<div>
<div class="flex justify-between items-center mb-2">
<label class="text-sm font-medium text-text-secondary">Zeit (Sekunden)</label>
<span class="text-base font-bold text-white bg-white/10 px-2 py-0.5 rounded-md min-w-[3ch] text-center">30</span>
</div>
<input class="w-full h-2 bg-surface-light rounded-lg appearance-none cursor-pointer" max="60" min="10" step="5" type="range" value="30"/>
</div>
</div>
</section>
<!-- Section: Fragetypen (Chips) -->
<section>
<div class="flex items-center justify-between mb-3 px-1">
<h3 class="text-white tracking-wide text-xs font-bold uppercase opacity-70">Fragetypen</h3>
<span class="text-xs text-text-secondary cursor-pointer">Alle wählen</span>
</div>
<div class="flex flex-wrap gap-3">
<!-- Chip: Titel (Active) -->
<label class="cursor-pointer group">
<input checked="" class="peer sr-only" type="checkbox"/>
<div class="px-4 py-2 rounded-full border border-primary bg-primary/10 text-primary font-medium text-sm transition-all peer-checked:bg-primary peer-checked:text-background-dark peer-checked:shadow-[0_0_10px_rgba(0,217,255,0.3)] hover:bg-primary/20">
                            Titel
                        </div>
</label>
<!-- Chip: Interpret (Active) -->
<label class="cursor-pointer group">
<input checked="" class="peer sr-only" type="checkbox"/>
<div class="px-4 py-2 rounded-full border border-white/10 bg-surface-dark text-text-secondary font-medium text-sm transition-all peer-checked:bg-primary peer-checked:text-background-dark peer-checked:border-primary peer-checked:shadow-[0_0_10px_rgba(0,217,255,0.3)] hover:bg-surface-light">
                            Interpret
                        </div>
</label>
<!-- Chip: Jahr (Inactive) -->
<label class="cursor-pointer group">
<input class="peer sr-only" type="checkbox"/>
<div class="px-4 py-2 rounded-full border border-white/10 bg-surface-dark text-text-secondary font-medium text-sm transition-all peer-checked:bg-primary peer-checked:text-background-dark peer-checked:border-primary peer-checked:shadow-[0_0_10px_rgba(0,217,255,0.3)] hover:bg-surface-light">
                            Jahr
                        </div>
</label>
<!-- Chip: Genre (Active) -->
<label class="cursor-pointer group">
<input checked="" class="peer sr-only" type="checkbox"/>
<div class="px-4 py-2 rounded-full border border-white/10 bg-surface-dark text-text-secondary font-medium text-sm transition-all peer-checked:bg-primary peer-checked:text-background-dark peer-checked:border-primary peer-checked:shadow-[0_0_10px_rgba(0,217,255,0.3)] hover:bg-surface-light">
                            Genre
                        </div>
</label>
<!-- Chip: Dekade (Inactive) -->
<label class="cursor-pointer group">
<input class="peer sr-only" type="checkbox"/>
<div class="px-4 py-2 rounded-full border border-white/10 bg-surface-dark text-text-secondary font-medium text-sm transition-all peer-checked:bg-primary peer-checked:text-background-dark peer-checked:border-primary peer-checked:shadow-[0_0_10px_rgba(0,217,255,0.3)] hover:bg-surface-light">
                            Dekade
                        </div>
</label>
</div>
</section>
</main>
<!-- Fixed Footer CTA -->
<div class="fixed bottom-0 left-0 w-full p-4 pb-8 bg-gradient-to-t from-background-dark via-background-dark to-transparent z-40">
<button class="w-full h-14 bg-primary hover:bg-primary-dark active:scale-[0.98] transition-all text-background-dark text-lg font-bold rounded-full shadow-[0_0_20px_rgba(0,217,255,0.4)] flex items-center justify-center gap-2">
<span class="material-symbols-outlined">play_arrow</span>
                SPIEL STARTEN
            </button>
</div>
</div>
</body></html>
