<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>BeatMaster Song Database</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Configuration -->
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#00d9ff",
              "background-light": "#f5f8f8",
              "background-dark": "#0f2023",
              "surface-dark": "#1a2c30", // Custom surface color for cards
            },
            fontFamily: {
              "display": ["Inter", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-gray-900 dark:text-white antialiased min-h-screen flex flex-col overflow-x-hidden">
<!-- Top Navigation Bar -->
<header class="sticky top-0 z-50 bg-background-light dark:bg-background-dark/95 backdrop-blur-md border-b border-gray-200 dark:border-white/5">
<div class="flex items-center p-4 justify-between">
<button class="flex size-12 shrink-0 items-center justify-center rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-gray-900 dark:text-white" style="font-size: 24px;">arrow_back</span>
</button>
<h1 class="text-lg font-bold leading-tight tracking-tight flex-1 text-center">Song Database</h1>
<button class="flex size-12 shrink-0 items-center justify-center rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-gray-900 dark:text-white" style="font-size: 24px;">settings</span>
</button>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col w-full max-w-md mx-auto px-4 pb-24">
<!-- Stats Headline -->
<div class="py-4">
<h2 class="text-[28px] font-bold leading-tight tracking-tight">1,243 Songs</h2>
<p class="text-sm text-gray-500 dark:text-gray-400 mt-1">Manage your music library</p>
</div>
<!-- Search Bar -->
<div class="mb-3">
<label class="relative flex w-full items-center">
<span class="absolute left-4 text-[#8dc4ce]">
<span class="material-symbols-outlined" style="font-size: 24px;">search</span>
</span>
<input class="w-full h-12 rounded-full border-none bg-white dark:bg-[#20454b] pl-12 pr-4 text-base font-medium placeholder-[#8dc4ce] text-gray-900 dark:text-white focus:ring-2 focus:ring-primary shadow-sm" placeholder="Search title or artist..." type="text"/>
</label>
</div>
<!-- Filters & Add Button Row -->
<div class="flex flex-col gap-4 mb-6">
<!-- Filter Chips -->
<div class="flex gap-3 overflow-x-auto no-scrollbar pb-1">
<button class="flex h-9 shrink-0 items-center justify-center gap-x-2 rounded-full bg-white dark:bg-[#20454b] pl-4 pr-3 border border-gray-100 dark:border-none shadow-sm active:scale-95 transition-transform">
<span class="text-sm font-medium whitespace-nowrap">All Genres</span>
<span class="material-symbols-outlined text-gray-400 dark:text-[#8dc4ce]" style="font-size: 20px;">keyboard_arrow_down</span>
</button>
<button class="flex h-9 shrink-0 items-center justify-center gap-x-2 rounded-full bg-white dark:bg-[#20454b] pl-4 pr-3 border border-gray-100 dark:border-none shadow-sm active:scale-95 transition-transform">
<span class="text-sm font-medium whitespace-nowrap">All Years</span>
<span class="material-symbols-outlined text-gray-400 dark:text-[#8dc4ce]" style="font-size: 20px;">keyboard_arrow_down</span>
</button>
<button class="flex h-9 shrink-0 items-center justify-center gap-x-2 rounded-full bg-white dark:bg-[#20454b] pl-4 pr-3 border border-gray-100 dark:border-none shadow-sm active:scale-95 transition-transform">
<span class="text-sm font-medium whitespace-nowrap">Sort By</span>
<span class="material-symbols-outlined text-gray-400 dark:text-[#8dc4ce]" style="font-size: 20px;">sort</span>
</button>
</div>
<!-- Primary CTA -->
<button class="flex w-full cursor-pointer items-center justify-center overflow-hidden rounded-full h-12 bg-primary text-background-dark hover:brightness-110 active:scale-[0.98] transition-all shadow-[0_0_20px_rgba(0,217,255,0.3)] gap-2">
<span class="material-symbols-outlined" style="font-size: 24px;">add</span>
<span class="text-base font-bold tracking-wide uppercase">Neuer Song</span>
</button>
</div>
<!-- Song List -->
<div class="flex flex-col gap-3">
<!-- Song Card 1 -->
<div class="group relative flex flex-col gap-3 rounded-2xl bg-white dark:bg-surface-dark p-4 shadow-sm border border-gray-100 dark:border-white/5 transition-all hover:border-primary/50">
<div class="flex justify-between items-start">
<div class="flex flex-col gap-1 min-w-0 pr-4">
<h3 class="text-base font-bold text-gray-900 dark:text-white truncate">Blinding Lights</h3>
<p class="text-sm text-gray-500 dark:text-gray-400 font-medium truncate">The Weeknd</p>
</div>
<div class="flex items-center gap-1 shrink-0">
<button class="size-8 flex items-center justify-center rounded-full text-gray-400 hover:text-primary hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined" style="font-size: 20px;">edit</span>
</button>
<button class="size-8 flex items-center justify-center rounded-full text-gray-400 hover:text-red-500 hover:bg-red-500/10 transition-colors">
<span class="material-symbols-outlined" style="font-size: 20px;">delete</span>
</button>
</div>
</div>
<div class="flex flex-wrap gap-2">
<span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-semibold bg-primary/10 text-primary">
                        Synth-Pop
                    </span>
<span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-semibold bg-gray-100 dark:bg-white/10 text-gray-600 dark:text-gray-300">
                        2019
                    </span>
</div>
</div>
<!-- Song Card 2 -->
<div class="group relative flex flex-col gap-3 rounded-2xl bg-white dark:bg-surface-dark p-4 shadow-sm border border-gray-100 dark:border-white/5 transition-all hover:border-primary/50">
<div class="flex justify-between items-start">
<div class="flex flex-col gap-1 min-w-0 pr-4">
<h3 class="text-base font-bold text-gray-900 dark:text-white truncate">Bohemian Rhapsody</h3>
<p class="text-sm text-gray-500 dark:text-gray-400 font-medium truncate">Queen</p>
</div>
<div class="flex items-center gap-1 shrink-0">
<button class="size-8 flex items-center justify-center rounded-full text-gray-400 hover:text-primary hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined" style="font-size: 20px;">edit</span>
</button>
<button class="size-8 flex items-center justify-center rounded-full text-gray-400 hover:text-red-500 hover:bg-red-500/10 transition-colors">
<span class="material-symbols-outlined" style="font-size: 20px;">delete</span>
</button>
</div>
</div>
<div class="flex flex-wrap gap-2">
<span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-semibold bg-primary/10 text-primary">
                        Rock
                    </span>
<span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-semibold bg-gray-100 dark:bg-white/10 text-gray-600 dark:text-gray-300">
                        1975
                    </span>
</div>
</div>
<!-- Song Card 3 -->
<div class="group relative flex flex-col gap-3 rounded-2xl bg-white dark:bg-surface-dark p-4 shadow-sm border border-gray-100 dark:border-white/5 transition-all hover:border-primary/50">
<div class="flex justify-between items-start">
<div class="flex flex-col gap-1 min-w-0 pr-4">
<h3 class="text-base font-bold text-gray-900 dark:text-white truncate">Levitating</h3>
<p class="text-sm text-gray-500 dark:text-gray-400 font-medium truncate">Dua Lipa</p>
</div>
<div class="flex items-center gap-1 shrink-0">
<button class="size-8 flex items-center justify-center rounded-full text-gray-400 hover:text-primary hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined" style="font-size: 20px;">edit</span>
</button>
<button class="size-8 flex items-center justify-center rounded-full text-gray-400 hover:text-red-500 hover:bg-red-500/10 transition-colors">
<span class="material-symbols-outlined" style="font-size: 20px;">delete</span>
</button>
</div>
</div>
<div class="flex flex-wrap gap-2">
<span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-semibold bg-primary/10 text-primary">
                        Disco-Pop
                    </span>
<span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-semibold bg-gray-100 dark:bg-white/10 text-gray-600 dark:text-gray-300">
                        2020
                    </span>
</div>
</div>
<!-- Song Card 4 -->
<div class="group relative flex flex-col gap-3 rounded-2xl bg-white dark:bg-surface-dark p-4 shadow-sm border border-gray-100 dark:border-white/5 transition-all hover:border-primary/50">
<div class="flex justify-between items-start">
<div class="flex flex-col gap-1 min-w-0 pr-4">
<h3 class="text-base font-bold text-gray-900 dark:text-white truncate">Shape of You</h3>
<p class="text-sm text-gray-500 dark:text-gray-400 font-medium truncate">Ed Sheeran</p>
</div>
<div class="flex items-center gap-1 shrink-0">
<button class="size-8 flex items-center justify-center rounded-full text-gray-400 hover:text-primary hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined" style="font-size: 20px;">edit</span>
</button>
<button class="size-8 flex items-center justify-center rounded-full text-gray-400 hover:text-red-500 hover:bg-red-500/10 transition-colors">
<span class="material-symbols-outlined" style="font-size: 20px;">delete</span>
</button>
</div>
</div>
<div class="flex flex-wrap gap-2">
<span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-semibold bg-primary/10 text-primary">
                        Pop
                    </span>
<span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-semibold bg-gray-100 dark:bg-white/10 text-gray-600 dark:text-gray-300">
                        2017
                    </span>
</div>
</div>
</div>
<!-- Pagination & Utilities -->
<div class="mt-8 flex flex-col gap-6 items-center">
<!-- Pagination -->
<div class="flex items-center gap-2 bg-white dark:bg-surface-dark rounded-full p-1 border border-gray-100 dark:border-white/5 shadow-sm">
<button class="size-10 flex items-center justify-center rounded-full hover:bg-gray-100 dark:hover:bg-white/5 text-gray-500 dark:text-gray-400 disabled:opacity-50">
<span class="material-symbols-outlined" style="font-size: 20px;">chevron_left</span>
</button>
<div class="px-4 text-sm font-semibold text-gray-900 dark:text-white">
                    Page 1 <span class="text-gray-400 dark:text-gray-500 font-normal">of 50</span>
</div>
<button class="size-10 flex items-center justify-center rounded-full bg-primary text-background-dark font-bold hover:brightness-110">
<span class="material-symbols-outlined" style="font-size: 20px;">chevron_right</span>
</button>
</div>
<!-- Import/Export Actions -->
<div class="flex flex-wrap justify-center gap-3 w-full">
<button class="flex-1 min-w-[140px] h-11 flex items-center justify-center gap-2 rounded-full border border-gray-200 dark:border-white/20 hover:bg-gray-50 dark:hover:bg-white/5 transition-colors">
<span class="material-symbols-outlined text-gray-500 dark:text-gray-300" style="font-size: 20px;">file_upload</span>
<span class="text-xs font-bold text-gray-700 dark:text-gray-300 uppercase tracking-wide">Importieren</span>
</button>
<button class="flex-1 min-w-[140px] h-11 flex items-center justify-center gap-2 rounded-full border border-gray-200 dark:border-white/20 hover:bg-gray-50 dark:hover:bg-white/5 transition-colors">
<span class="material-symbols-outlined text-gray-500 dark:text-gray-300" style="font-size: 20px;">file_download</span>
<span class="text-xs font-bold text-gray-700 dark:text-gray-300 uppercase tracking-wide">Exportieren</span>
</button>
</div>
</div>
</main>
</body></html>
