<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>BeatMaster Answer Reveal</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS with Config -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#00d9ff",
                        "primary-dim": "#00b8d9",
                        "background-light": "#f5f8f8",
                        "background-dark": "#0f2023",
                        "surface-dark": "#162a2e",
                        "surface-highlight": "#1e363b",
                        "accent-text": "#8dc4ce",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "1.5rem",
                        "xl": "2rem", 
                        "2xl": "2.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom scrollbar for webkit */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0f2023; 
        }
        ::-webkit-scrollbar-thumb {
            background: #2e626b; 
            border-radius: 10px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-white antialiased selection:bg-primary selection:text-black">
<div class="relative flex h-full min-h-screen w-full flex-col overflow-hidden">
<!-- Header -->
<header class="sticky top-0 z-20 flex items-center justify-between bg-background-dark/95 backdrop-blur-sm p-4 pb-2 border-b border-white/5">
<div class="flex size-10 shrink-0 items-center justify-center rounded-full bg-white/5 text-white active:scale-95 transition-transform">
<span class="material-symbols-outlined">arrow_back</span>
</div>
<h2 class="text-white text-lg font-bold leading-tight tracking-tight flex-1 text-center">BeatMaster</h2>
<button class="flex h-10 items-center justify-end px-2 active:opacity-70 transition-opacity">
<span class="text-accent-text text-sm font-bold tracking-wide uppercase">Beenden</span>
</button>
</header>
<!-- Scrollable Content -->
<main class="flex-1 flex flex-col gap-6 p-4 pb-32 overflow-y-auto w-full max-w-md mx-auto">
<!-- Headline -->
<div class="flex flex-col items-center justify-center pt-2">
<span class="text-primary text-xs font-bold tracking-[0.2em] uppercase mb-1 opacity-80">Runde 4/10</span>
<h1 class="text-white text-4xl font-black tracking-tight text-center drop-shadow-[0_0_15px_rgba(0,217,255,0.3)]">LÖSUNG</h1>
</div>
<!-- Song Reveal Card -->
<div class="group relative w-full">
<!-- Glow Effect -->
<div class="absolute -inset-1 bg-gradient-to-r from-primary/20 via-primary/10 to-transparent rounded-2xl blur opacity-75 group-hover:opacity-100 transition duration-1000 group-hover:duration-200"></div>
<div class="relative flex flex-col items-center bg-surface-dark rounded-2xl p-6 shadow-xl border border-white/10">
<div class="relative mb-5">
<!-- Album Art -->
<div class="w-40 h-40 rounded-full shadow-2xl overflow-hidden border-4 border-surface-highlight ring-2 ring-primary/30" data-alt="Abstract colorful album cover art with geometric shapes representing music beats">
<div class="w-full h-full bg-cover bg-center" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAy5NmUZeaZ_eETrr69e1R_5S8RcpCEdIpbN6FwSeSsawc7cIpxnZglXL_VKaJ9CoEIeOmX8eH1ptZ1PXsZRa2YswsUVoJai4t05J5pA5E6J-SpPM3uLzXq-ASj7ruiAWyJBWoU1toQnKxJXLnh0xbutQWvd8EGqXQvp_A1cUDdzWwjtx7nbF6jv3QUVgsIKI0heq4z9MiYAblQgTpNNyL91cxdsigvNWR1x3jvwRJkTZtt_1qOgrgr6kQkhOjt-v8lzcFz-MynL3Up');"></div>
</div>
<!-- Playing Icon -->
<div class="absolute bottom-0 right-0 bg-primary text-background-dark rounded-full p-2 shadow-lg flex items-center justify-center transform translate-x-1 translate-y-1">
<span class="material-symbols-outlined text-xl">music_note</span>
</div>
</div>
<div class="text-center space-y-2 w-full">
<h3 class="text-2xl font-bold leading-tight text-white line-clamp-2">Bohemian Rhapsody</h3>
<p class="text-accent-text text-base font-medium">Queen • 1975 • Rock</p>
<div class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full bg-white/5 border border-white/5 mt-2">
<span class="material-symbols-outlined text-xs text-white/60">album</span>
<span class="text-xs text-white/60 font-medium">A Night at the Opera</span>
</div>
</div>
</div>
</div>
<!-- Scoring Section Header -->
<div class="flex items-center gap-4 mt-2">
<div class="h-px bg-gradient-to-r from-transparent via-white/20 to-transparent flex-1"></div>
<h3 class="text-white text-sm font-bold tracking-widest uppercase">Punkte vergeben</h3>
<div class="h-px bg-gradient-to-r from-transparent via-white/20 to-transparent flex-1"></div>
</div>
<!-- Team A Scoring Module -->
<div class="bg-surface-dark rounded-2xl p-5 border border-white/5 space-y-4">
<div class="flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="size-10 rounded-full bg-purple-500/20 text-purple-400 flex items-center justify-center font-bold text-lg border border-purple-500/30">A</div>
<span class="text-white text-lg font-bold">Die Rocker</span>
</div>
<div class="flex flex-col items-end">
<span class="text-primary text-xl font-bold font-mono tracking-tight">+3</span>
<span class="text-xs text-white/40 font-medium uppercase">Punkte</span>
</div>
</div>
<!-- Toggles -->
<div class="flex flex-wrap gap-2">
<button class="flex-1 min-w-[80px] h-10 rounded-full bg-primary text-background-dark font-bold text-sm flex items-center justify-center gap-1.5 shadow-[0_0_10px_rgba(0,217,255,0.4)] transition-all transform active:scale-95">
<span class="material-symbols-outlined text-[18px]">check</span>
                        Titel
                    </button>
<button class="flex-1 min-w-[80px] h-10 rounded-full bg-primary text-background-dark font-bold text-sm flex items-center justify-center gap-1.5 shadow-[0_0_10px_rgba(0,217,255,0.4)] transition-all transform active:scale-95">
<span class="material-symbols-outlined text-[18px]">check</span>
                        Interpret
                    </button>
<button class="flex-1 min-w-[80px] h-10 rounded-full bg-primary text-background-dark font-bold text-sm flex items-center justify-center gap-1.5 shadow-[0_0_10px_rgba(0,217,255,0.4)] transition-all transform active:scale-95">
<span class="material-symbols-outlined text-[18px]">check</span>
                        Jahr
                    </button>
</div>
<!-- Quick Actions -->
<div class="flex items-center justify-between pt-2 border-t border-white/5">
<button class="text-xs font-medium text-white/50 hover:text-white flex items-center gap-1 px-2 py-1 rounded hover:bg-white/5 transition-colors">
<span class="material-symbols-outlined text-[16px]">close</span> Alle entfernen
                    </button>
<button class="text-xs font-bold text-primary flex items-center gap-1 px-2 py-1 rounded hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-[16px]">done_all</span> Alle wählen
                    </button>
</div>
</div>
<!-- Team B Scoring Module (Partial Points Example) -->
<div class="bg-surface-dark rounded-2xl p-5 border border-white/5 space-y-4 opacity-90">
<div class="flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="size-10 rounded-full bg-orange-500/20 text-orange-400 flex items-center justify-center font-bold text-lg border border-orange-500/30">B</div>
<span class="text-white text-lg font-bold">Pop Stars</span>
</div>
<div class="flex flex-col items-end">
<span class="text-white/80 text-xl font-bold font-mono tracking-tight">+1</span>
<span class="text-xs text-white/40 font-medium uppercase">Punkte</span>
</div>
</div>
<!-- Toggles -->
<div class="flex flex-wrap gap-2">
<!-- Active State -->
<button class="flex-1 min-w-[80px] h-10 rounded-full bg-primary text-background-dark font-bold text-sm flex items-center justify-center gap-1.5 shadow-[0_0_10px_rgba(0,217,255,0.4)] transition-all active:scale-95">
<span class="material-symbols-outlined text-[18px]">check</span>
                        Titel
                    </button>
<!-- Inactive State -->
<button class="flex-1 min-w-[80px] h-10 rounded-full bg-transparent border border-white/20 text-white/40 font-medium text-sm flex items-center justify-center gap-1.5 hover:border-white/40 transition-all active:scale-95">
                        Interpret
                    </button>
<!-- Inactive State -->
<button class="flex-1 min-w-[80px] h-10 rounded-full bg-transparent border border-white/20 text-white/40 font-medium text-sm flex items-center justify-center gap-1.5 hover:border-white/40 transition-all active:scale-95">
                        Jahr
                    </button>
</div>
<!-- Quick Actions -->
<div class="flex items-center justify-between pt-2 border-t border-white/5">
<button class="text-xs font-medium text-white/50 hover:text-white flex items-center gap-1 px-2 py-1 rounded hover:bg-white/5 transition-colors">
<span class="material-symbols-outlined text-[16px]">close</span> Alle entfernen
                    </button>
<button class="text-xs font-bold text-primary flex items-center gap-1 px-2 py-1 rounded hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-[16px]">done_all</span> Alle wählen
                    </button>
</div>
</div>
</main>
<!-- Fixed Bottom CTA -->
<div class="fixed bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-background-dark via-background-dark to-transparent z-30">
<div class="w-full max-w-md mx-auto">
<button class="relative w-full overflow-hidden rounded-full bg-primary py-4 text-background-dark shadow-[0_0_20px_rgba(0,217,255,0.4)] transition-transform active:scale-[0.98] group">
<span class="absolute inset-0 bg-white/20 opacity-0 group-hover:opacity-100 transition-opacity"></span>
<div class="relative flex items-center justify-center gap-2">
<span class="text-lg font-black tracking-wide uppercase">Nächster Song</span>
<span class="material-symbols-outlined font-bold group-hover:translate-x-1 transition-transform">arrow_forward</span>
</div>
</button>
</div>
</div>
</div>
</body></html>
