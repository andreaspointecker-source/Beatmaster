<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>BeatMaster Gameplay</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#00d9ff",
                        "background-light": "#f5f8f8",
                        "background-dark": "#0f2023",
                        "surface-dark": "#162a2e",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 600, 'GRAD' 0, 'opsz' 24; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-white h-screen w-full flex flex-col overflow-hidden antialiased bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-[#1a383f] to-background-dark">
<!-- Top Navigation Bar -->
<header class="flex items-center justify-between p-4 pt-6 z-20">
<button class="w-12 h-12 flex items-center justify-center rounded-full hover:bg-white/10 active:bg-white/20 transition-colors">
<span class="material-symbols-outlined text-white text-[28px]">pause_circle</span>
</button>
<div class="bg-surface-dark/80 backdrop-blur border border-white/10 px-5 py-2 rounded-full shadow-lg">
<span class="text-xs font-bold tracking-widest uppercase text-primary drop-shadow-[0_0_5px_rgba(0,217,255,0.4)]">Runde 3/10</span>
</div>
<button class="w-12 h-12 flex items-center justify-center rounded-full hover:bg-white/10 active:bg-white/20 transition-colors">
<span class="material-symbols-outlined text-white text-[28px]">settings</span>
</button>
</header>
<!-- Song Progress Bar -->
<div class="px-6 w-full z-20">
<div class="h-1.5 bg-white/5 rounded-full overflow-hidden w-full">
<div class="h-full bg-primary w-[35%] shadow-[0_0_10px_#00d9ff] rounded-r-full"></div>
</div>
</div>
<!-- Main Game Area -->
<main class="flex-1 flex flex-col items-center justify-center relative w-full px-6 gap-8 z-10">
<!-- Status Label & Visualizer -->
<div class="flex flex-col items-center gap-4 w-full">
<h3 class="text-primary text-sm font-bold tracking-[0.25em] uppercase animate-pulse">Musik läuft...</h3>
<!-- CSS Visualizer Bars -->
<div class="flex items-end justify-center gap-1.5 h-12 w-full max-w-[240px]">
<div class="w-1.5 bg-primary/30 rounded-full h-4"></div>
<div class="w-1.5 bg-primary/60 rounded-full h-8"></div>
<div class="w-1.5 bg-primary rounded-full h-12 shadow-[0_0_8px_#00d9ff]"></div>
<div class="w-1.5 bg-primary/80 rounded-full h-7"></div>
<div class="w-1.5 bg-primary rounded-full h-10 shadow-[0_0_8px_#00d9ff]"></div>
<div class="w-1.5 bg-primary/40 rounded-full h-5"></div>
<div class="w-1.5 bg-primary rounded-full h-11 shadow-[0_0_8px_#00d9ff]"></div>
<div class="w-1.5 bg-primary/70 rounded-full h-6"></div>
<div class="w-1.5 bg-primary/30 rounded-full h-3"></div>
</div>
</div>
<!-- Timer Circle -->
<div class="relative flex items-center justify-center py-2">
<!-- Background Glow -->
<div class="absolute inset-0 bg-primary/10 blur-3xl rounded-full transform scale-150"></div>
<div class="w-56 h-56 rounded-full relative flex items-center justify-center bg-surface-dark/30 backdrop-blur-sm shadow-2xl">
<!-- SVG Ring -->
<svg class="absolute inset-0 w-full h-full -rotate-90" viewbox="0 0 100 100">
<!-- Track -->
<circle cx="50" cy="50" fill="transparent" r="46" stroke="rgba(255,255,255,0.05)" stroke-width="3"></circle>
<!-- Progress -->
<circle class="drop-shadow-[0_0_6px_rgba(0,217,255,0.6)]" cx="50" cy="50" fill="transparent" r="46" stroke="#00d9ff" stroke-dasharray="289" stroke-dashoffset="60" stroke-linecap="round" stroke-width="3"></circle>
</svg>
<div class="text-center z-10 flex flex-col items-center">
<span class="block text-[64px] font-black tracking-tighter text-white leading-none drop-shadow-lg">00:15</span>
<span class="text-[10px] font-bold uppercase tracking-[0.2em] text-white/40 mt-2">Sekunden</span>
</div>
</div>
</div>
<!-- Active Team Card -->
<div class="w-full flex flex-col items-center gap-5">
<div class="bg-gradient-to-br from-surface-dark/90 to-background-dark/90 backdrop-blur-md border border-white/10 p-5 rounded-3xl w-full max-w-xs text-center shadow-xl relative overflow-hidden group">
<div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-primary/50 to-transparent"></div>
<p class="text-[10px] uppercase text-white/50 font-bold mb-2 tracking-widest">Jetzt dran</p>
<h2 class="text-2xl font-bold text-white tracking-tight">Die Party Löwen</h2>
</div>
<!-- Tasks / Categories -->
<div class="flex flex-col items-center gap-2">
<p class="text-[10px] uppercase text-white/30 font-bold tracking-widest">Zu beantworten</p>
<div class="flex flex-wrap justify-center gap-2">
<span class="px-4 py-1.5 rounded-full bg-primary/10 border border-primary/20 text-xs font-semibold text-primary shadow-[0_0_10px_rgba(0,217,255,0.1)]">Interpret</span>
<span class="px-4 py-1.5 rounded-full bg-primary/10 border border-primary/20 text-xs font-semibold text-primary shadow-[0_0_10px_rgba(0,217,255,0.1)]">Songtitel</span>
<span class="px-4 py-1.5 rounded-full bg-primary/10 border border-primary/20 text-xs font-semibold text-primary shadow-[0_0_10px_rgba(0,217,255,0.1)]">Jahr</span>
</div>
</div>
</div>
</main>
<!-- Bottom Controls -->
<footer class="p-6 pb-10 flex flex-col gap-6 bg-gradient-to-t from-background-dark via-background-dark/95 to-transparent z-20">
<!-- Primary Action -->
<button class="w-full bg-primary hover:bg-[#33e0ff] active:bg-[#00c0e0] text-background-dark h-16 rounded-full font-black text-lg tracking-wider uppercase shadow-[0_0_30px_rgba(0,217,255,0.3)] hover:shadow-[0_0_40px_rgba(0,217,255,0.5)] active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-3 group">
<span class="material-symbols-outlined group-hover:scale-110 transition-transform">stop_circle</span>
            Song Beenden
        </button>
<!-- Secondary Actions -->
<div class="flex justify-between items-center px-6">
<button class="flex flex-col items-center gap-2 text-white/50 hover:text-white transition group w-20">
<div class="w-12 h-12 rounded-full bg-white/5 border border-white/5 group-hover:bg-white/10 group-hover:border-white/20 flex items-center justify-center transition-all shadow-lg">
<span class="material-symbols-outlined text-[24px]">replay</span>
</div>
<span class="text-[10px] font-bold uppercase tracking-wider">Wiederholen</span>
</button>
<button class="flex flex-col items-center gap-2 text-white/50 hover:text-white transition group w-20">
<div class="w-12 h-12 rounded-full bg-white/5 border border-white/5 group-hover:bg-white/10 group-hover:border-white/20 flex items-center justify-center transition-all shadow-lg">
<span class="material-symbols-outlined text-[24px]">skip_next</span>
</div>
<span class="text-[10px] font-bold uppercase tracking-wider">Überspringen</span>
</button>
</div>
</footer>
</body></html>
