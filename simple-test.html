<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Button Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f2023;
      color: white;
      padding: 20px;
    }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { margin-bottom: 20px; color: #00d9ff; }
    .section {
      background: #162a2d;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 8px;
    }
    button {
      width: 100%;
      padding: 15px;
      margin: 10px 0;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
    }
    button:hover { opacity: 0.8; }
    .btn-primary { background: #00d9ff; color: #0f2023; }
    .btn-success { background: #4ade80; color: #0f2023; }
    .btn-warning { background: #fbbf24; color: #0f2023; }
    .btn-danger { background: #f87171; color: white; }

    #log {
      background: #000;
      padding: 15px;
      border-radius: 8px;
      font-family: monospace;
      font-size: 12px;
      max-height: 400px;
      overflow-y: auto;
    }
    .log-line { margin: 2px 0; }
    .success { color: #4ade80; }
    .error { color: #f87171; }
    .warning { color: #fbbf24; }
    .info { color: #60a5fa; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔍 Simple Button Test</h1>

    <div class="section">
      <h2>Status: <span id="status">Laden...</span></h2>
    </div>

    <div class="section">
      <h3>Test 1: Einfacher Button</h3>
      <button class="btn-primary" onclick="test1()">Klick mich!</button>
    </div>

    <div class="section">
      <h3>Test 2: addEventListener</h3>
      <button class="btn-success" id="test2">Klick mich!</button>
    </div>

    <div class="section">
      <h3>Test 3: data-action</h3>
      <button class="btn-warning" data-action="test">Klick mich!</button>
    </div>

    <div class="section">
      <h3>Test 4: HomeScreen Button (wie in der echten App)</h3>
      <div id="home-container"></div>
    </div>

    <div class="section">
      <h3>Log</h3>
      <div id="log"></div>
    </div>
  </div>

  <script>
    const logEl = document.getElementById('log');
    const statusEl = document.getElementById('status');

    function log(msg, type = 'info') {
      const line = document.createElement('div');
      line.className = `log-line ${type}`;
      const time = new Date().toLocaleTimeString();
      line.textContent = `[${time}] ${msg}`;
      logEl.appendChild(line);
      logEl.scrollTop = logEl.scrollHeight;
      console.log(msg);
    }

    // Test 1: Inline onclick
    function test1() {
      log('✅ Test 1 funktioniert - Inline onclick', 'success');
      statusEl.textContent = 'Test 1 OK';
      statusEl.style.color = '#4ade80';
    }

    // Start Tests sofort (nicht auf window.load warten)
    log('🔄 Tests starten...', 'info');

    // Test 2: addEventListener
    setTimeout(() => {
      const btn2 = document.getElementById('test2');
      if (btn2) {
        btn2.addEventListener('click', () => {
          log('✅ Test 2 funktioniert - addEventListener', 'success');
          statusEl.textContent = 'Test 2 OK';
          statusEl.style.color = '#4ade80';
        });
        log('ℹ️ Test 2 Event Listener bereit', 'info');
      } else {
        log('❌ Test 2 Button nicht gefunden', 'error');
      }
    }, 100);

    // Test 3: data-action
    setTimeout(() => {
      const btn3 = document.querySelector('[data-action="test"]');
      if (btn3) {
        btn3.addEventListener('click', () => {
          log('✅ Test 3 funktioniert - data-action', 'success');
          statusEl.textContent = 'Test 3 OK';
          statusEl.style.color = '#4ade80';
        });
        log('ℹ️ Test 3 Event Listener bereit', 'info');
      } else {
        log('❌ Test 3 Button nicht gefunden', 'error');
      }
    }, 100);

    // Test 4: Lade HomeScreen
    setTimeout(() => {
      log('🔄 Lade HomeScreen Klasse...', 'info');

      // Lade Scripts nacheinander
      const scripts = [
        'js/config.js',
        'js/modules/utils.js',
        'js/state.js',
        'js/modules/storage.js',
        'js/screens/home.js'
      ];

      let loadedCount = 0;

      function loadScript(src) {
        return new Promise((resolve, reject) => {
          const script = document.createElement('script');
          script.src = src;
          script.onload = () => {
            loadedCount++;
            log(`✅ ${src} geladen (${loadedCount}/${scripts.length})`, 'success');
            resolve();
          };
          script.onerror = () => {
            log(`❌ ${src} konnte nicht geladen werden`, 'error');
            reject();
          };
          document.head.appendChild(script);
        });
      }

      async function loadAllScripts() {
        try {
          for (const src of scripts) {
            await loadScript(src);
          }

          log('✅ Alle Scripts geladen', 'success');

          // Teste HomeScreen
          if (typeof HomeScreen !== 'undefined') {
            log('✅ HomeScreen Klasse gefunden', 'success');

            const container = document.getElementById('home-container');
            const homeScreen = new HomeScreen();

            log('🔄 Rendere HomeScreen...', 'info');
            homeScreen.render(container);

            log('✅ HomeScreen gerendert', 'success');

            // Prüfe Buttons
            const buttons = container.querySelectorAll('button[data-action]');
            log(`ℹ️ ${buttons.length} Buttons gefunden`, 'info');

            // Prüfe ob Event Listeners funktionieren
            const newGameBtn = container.querySelector('[data-action="new-game"]');
            if (newGameBtn) {
              log('✅ "Neues Spiel" Button gefunden', 'success');

              // Simuliere Click
              let clicked = false;
              setTimeout(() => {
                newGameBtn.addEventListener('click', () => {
                  clicked = true;
                  log('✅ HomeScreen Button Click funktioniert!', 'success');
                  statusEl.textContent = 'HomeScreen OK!';
                  statusEl.style.color = '#4ade80';
                });

                // Test Click nach 500ms
                setTimeout(() => {
                  newGameBtn.click();

                  setTimeout(() => {
                    if (!clicked) {
                      log('❌ Click wurde nicht registriert - attachEventListeners() fehlt!', 'error');
                      log('⚠️ Das ist das Problem in der Haupt-App!', 'warning');
                      statusEl.textContent = 'FEHLER: Event Listeners fehlen!';
                      statusEl.style.color = '#f87171';
                    }
                  }, 100);
                }, 500);

              }, 100);

            } else {
              log('❌ "Neues Spiel" Button nicht gefunden', 'error');
            }

          } else {
            log('❌ HomeScreen Klasse nicht gefunden', 'error');
          }

        } catch (error) {
          log(`❌ Fehler beim Laden: ${error.message}`, 'error');
        }
      }

      loadAllScripts();

    }, 200);

    statusEl.textContent = 'Tests laufen...';
    statusEl.style.color = '#fbbf24';

    log('ℹ️ Klicke auf die Buttons um sie zu testen', 'info');
  </script>
</body>
</html>
