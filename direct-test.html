<!DOCTYPE html>
<html lang="de" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Direct Console Test</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#00d9ff",
            "background-dark": "#0f2023",
            "surface-dark": "#162a2d",
          },
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 600; }
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-background-dark font-display text-white antialiased min-h-screen overflow-hidden relative">
  <!-- Genau wie in index.html -->
  <div id="ambient-background" class="absolute inset-0 z-0 pointer-events-none overflow-hidden">
    <div class="absolute top-[-150px] left-1/2 -translate-x-1/2 w-[600px] h-[600px] bg-primary/10 rounded-full blur-[120px]"></div>
    <div class="absolute bottom-[-100px] right-[-50px] w-[400px] h-[400px] bg-teal-800/20 rounded-full blur-[100px]"></div>
  </div>

  <div id="app" class="relative z-10">
    <main id="main-content" class="flex flex-col h-full min-h-screen w-full max-w-md mx-auto">
      <div class="screen-container" id="container"></div>
    </main>
  </div>

  <script src="js/config.js"></script>
  <script src="js/modules/utils.js"></script>
  <script src="js/state.js"></script>
  <script src="js/modules/storage.js"></script>
  <script src="js/screens/home.js"></script>
  <script src="js/app.js"></script>

  <script>
    console.log('=== DIRECT TEST START ===');

    // Warte bis alles geladen ist
    setTimeout(() => {
      console.log('1. Prüfe ob App existiert:', typeof App);
      console.log('2. Prüfe ob HomeScreen existiert:', typeof HomeScreen);

      // Rendere HomeScreen manuell
      const container = document.getElementById('container');
      console.log('3. Container gefunden:', !!container);

      if (typeof HomeScreen !== 'undefined') {
        const homeScreen = new HomeScreen();
        console.log('4. HomeScreen Instanz erstellt:', !!homeScreen);

        homeScreen.render(container);
        console.log('5. HomeScreen gerendert');

        // Prüfe Buttons
        const buttons = container.querySelectorAll('button[data-action]');
        console.log('6. Buttons gefunden:', buttons.length);

        buttons.forEach((btn, i) => {
          console.log(`   Button ${i + 1}:`, btn.dataset.action, btn);
        });

        // Teste manuell einen Klick
        const newGameBtn = container.querySelector('[data-action="new-game"]');
        console.log('7. "Neues Spiel" Button:', newGameBtn);

        if (newGameBtn) {
          console.log('8. Button Eigenschaften:');
          console.log('   - offsetWidth:', newGameBtn.offsetWidth);
          console.log('   - offsetHeight:', newGameBtn.offsetHeight);
          console.log('   - pointer-events:', window.getComputedStyle(newGameBtn).pointerEvents);
          console.log('   - z-index:', window.getComputedStyle(newGameBtn).zIndex);
          console.log('   - position:', window.getComputedStyle(newGameBtn).position);
          console.log('   - display:', window.getComputedStyle(newGameBtn).display);
          console.log('   - visibility:', window.getComputedStyle(newGameBtn).visibility);

          // Prüfe Event Listener
          console.log('9. Teste Click Simulation...');

          let clicked = false;
          newGameBtn.addEventListener('click', () => {
            clicked = true;
            console.log('✅ ✅ ✅ BUTTON CLICK FUNKTIONIERT! ✅ ✅ ✅');
          });

          // Simuliere Click
          newGameBtn.click();

          setTimeout(() => {
            if (clicked) {
              console.log('✅ Programmatischer Click: ERFOLG');
            } else {
              console.error('❌ Programmatischer Click: FEHLGESCHLAGEN');
            }

            // Instruktionen
            console.log('');
            console.log('===========================================');
            console.log('JETZT BITTE MANUELL TESTEN:');
            console.log('1. Klicke auf den "NEUES SPIEL STARTEN" Button');
            console.log('2. Schau ob hier eine Nachricht erscheint');
            console.log('===========================================');
          }, 100);
        }
      }
    }, 500);
  </script>
</body>
</html>
