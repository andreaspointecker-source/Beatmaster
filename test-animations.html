<!DOCTYPE html>
<html lang="de" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BeatMaster - Animation Tests</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#00d9ff",
            "background-dark": "#0f2023",
            "surface-dark": "#162a2d",
          }
        }
      }
    }
  </script>

  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
    }
  </style>
</head>
<body class="bg-background-dark text-white p-8">
  <div class="max-w-4xl mx-auto">
    <h1 class="text-4xl font-bold mb-8 text-primary">BeatMaster - Animation Tests</h1>

    <!-- Test Controls -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
      <!-- Countdown Timer Test -->
      <div class="bg-surface-dark p-6 rounded-xl">
        <h2 class="text-2xl font-bold mb-4">Countdown Timer</h2>
        <button id="test-countdown" class="w-full bg-primary text-black font-bold py-3 px-6 rounded-lg hover:bg-primary/90 transition-all">
          Start 5-Sekunden Countdown
        </button>
        <div id="countdown-display" class="mt-4 text-4xl font-bold text-center text-primary min-h-[60px]"></div>
      </div>

      <!-- Question Animator Test -->
      <div class="bg-surface-dark p-6 rounded-xl">
        <h2 class="text-2xl font-bold mb-4">Question Animator</h2>
        <button id="test-question" class="w-full bg-primary text-black font-bold py-3 px-6 rounded-lg hover:bg-primary/90 transition-all">
          Zeige Fragen-Animation
        </button>
      </div>

      <!-- Vinyl Animator Test -->
      <div class="bg-surface-dark p-6 rounded-xl">
        <h2 class="text-2xl font-bold mb-4">Vinyl Animator</h2>
        <button id="test-vinyl-show" class="w-full bg-primary text-black font-bold py-3 px-6 rounded-lg hover:bg-primary/90 transition-all mb-2">
          Zeige Vinyl
        </button>
        <p class="text-xs text-white/50 mt-2">
          Hinweis: ESC-Taste drücken oder Button unten zum Verstecken
        </p>
      </div>

      <!-- Sound Player Test -->
      <div class="bg-surface-dark p-6 rounded-xl">
        <h2 class="text-2xl font-bold mb-4">Sound Player</h2>
        <button id="test-sound-beep" class="w-full bg-primary text-black font-bold py-3 px-6 rounded-lg hover:bg-primary/90 transition-all mb-2">
          Spiele Beep
        </button>
        <button id="test-sound-final" class="w-full bg-primary text-black font-bold py-3 px-6 rounded-lg hover:bg-primary/90 transition-all">
          Spiele Final Beep
        </button>
        <p class="text-xs text-white/50 mt-2">
          Hinweis: Sound-Dateien müssen in assets/sounds/ vorhanden sein
        </p>
      </div>
    </div>

    <!-- Vinyl Hide Button (Fixed, Above Overlay) -->
    <button id="test-vinyl-hide" class="fixed bottom-8 right-8 z-[60] bg-red-500 text-white font-bold py-3 px-6 rounded-lg hover:bg-red-600 transition-all shadow-lg" style="display: none;">
      Verstecke Vinyl (ESC)
    </button>

    <!-- Test Container -->
    <div id="test-container" class="bg-surface-dark rounded-xl min-h-[400px] relative overflow-hidden">
      <!-- Animations will appear here -->
    </div>

    <!-- Console Log -->
    <div class="mt-8 bg-black/50 p-4 rounded-xl">
      <h3 class="text-lg font-bold mb-2">Console</h3>
      <div id="console-log" class="font-mono text-xs text-green-400 max-h-[200px] overflow-y-auto">
        <div>Ready to test animations...</div>
      </div>
    </div>
  </div>

  <!-- Load Animation Modules -->
  <script src="js/modules/countdown-timer.js"></script>
  <script src="js/modules/question-animator.js"></script>
  <script src="js/modules/vinyl-animator.js"></script>
  <script src="js/modules/sound-player.js"></script>

  <!-- Test Script -->
  <script>
    const container = document.getElementById('test-container');
    const consoleLog = document.getElementById('console-log');

    function log(message) {
      const div = document.createElement('div');
      div.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
      consoleLog.appendChild(div);
      consoleLog.scrollTop = consoleLog.scrollHeight;
    }

    // Test 1: Countdown Timer
    document.getElementById('test-countdown').addEventListener('click', () => {
      log('Starting countdown timer...');
      const display = document.getElementById('countdown-display');

      const timer = new CountdownTimer(5, {
        onTick: (remaining) => {
          display.textContent = remaining;
          display.className = 'mt-4 text-6xl font-bold text-center text-primary min-h-[60px] animate-pulse';
          log(`Tick: ${remaining} seconds`);

          // Optional: Play sound if available
          if (SoundPlayer.isLoaded('beep')) {
            SoundPlayer.play('beep');
          }
        },
        onComplete: () => {
          display.textContent = '🎉';
          display.className = 'mt-4 text-6xl font-bold text-center text-green-500 min-h-[60px]';
          log('Countdown complete!');

          // Optional: Play final sound
          if (SoundPlayer.isLoaded('finalBeep')) {
            SoundPlayer.play('finalBeep');
          }

          setTimeout(() => {
            display.textContent = '';
          }, 2000);
        }
      });

      timer.start();
    });

    // Test 2: Question Animator
    document.getElementById('test-question').addEventListener('click', async () => {
      log('Starting question animation...');
      container.innerHTML = '';

      const animator = new QuestionAnimator(container);
      await animator.animate('Wie heißt dieser Song?');

      log('Question animation complete!');

      setTimeout(() => {
        container.innerHTML = '';
        log('Cleared container');
      }, 3000);
    });

    // Test 3: Vinyl Animator
    let vinylAnimator = null;
    const hideVinylBtn = document.getElementById('test-vinyl-hide');

    document.getElementById('test-vinyl-show').addEventListener('click', () => {
      log('Showing vinyl overlay...');
      if (!vinylAnimator) {
        vinylAnimator = new VinylAnimator(container);
      }
      vinylAnimator.show();
      hideVinylBtn.style.display = 'block';
      log('Vinyl is spinning! Press ESC or click button to hide.');
    });

    hideVinylBtn.addEventListener('click', () => {
      log('Hiding vinyl overlay...');
      if (vinylAnimator) {
        vinylAnimator.hide();
        hideVinylBtn.style.display = 'none';
        log('Vinyl hidden');
      }
    });

    // ESC key to hide vinyl
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && vinylAnimator && vinylAnimator.isShowing()) {
        log('ESC pressed - hiding vinyl...');
        vinylAnimator.hide();
        hideVinylBtn.style.display = 'none';
      }
    });

    // Test 4: Sound Player
    document.getElementById('test-sound-beep').addEventListener('click', () => {
      log('Playing beep sound...');
      SoundPlayer.play('beep');
      if (!SoundPlayer.isLoaded('beep')) {
        log('Warning: beep.mp3 not loaded (file not found)');
      }
    });

    document.getElementById('test-sound-final').addEventListener('click', () => {
      log('Playing final beep sound...');
      SoundPlayer.play('finalBeep');
      if (!SoundPlayer.isLoaded('finalBeep')) {
        log('Warning: final-beep.mp3 not loaded (file not found)');
      }
    });

    // Initialize
    log('Animation test page loaded');
    log('Click the buttons above to test each animation');
  </script>
</body>
</html>
